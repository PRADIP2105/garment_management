<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Main Menu</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="ion-text-center">
    <h1 style="color: var(--ion-color-primary); margin-top: 20px;">WELCOME TO PAGE ONE</h1>
    <p style="margin-bottom: 30px;">Select a page to open:</p>

    <ion-button expand="block" (click)="goToPage('page-two')" color="primary" style="margin-bottom: 12px;">
      OPEN PAGE TWO
    </ion-button>
    <ion-button expand="block" (click)="goToPage('page-three')" color="primary" style="margin-bottom: 12px;">
      OPEN PAGE THREE
    </ion-button>
    <ion-button expand="block" (click)="goToPage('page-four')" color="primary" style="margin-bottom: 12px;">
      OPEN PAGE FOUR
    </ion-button>
    <ion-button expand="block" (click)="goToPage('page-five')" color="primary" style="margin-bottom: 12px;">
      OPEN PAGE FIVE
    </ion-button>
  </div>
</ion-content>
