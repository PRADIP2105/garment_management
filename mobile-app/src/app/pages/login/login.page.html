<ion-content [fullscreen]="true" class="login-content" scrollY="false">

  <!-- Top green hero -->
  <div class="login-hero">
    <h1 class="hero-title">Garment Management</h1>
    <p class="hero-subtitle">Production Tracking System</p>
  </div>

  <!-- White card -->
  <div class="login-card">
    <h2 class="card-title">Sign In</h2>

    <!-- Username -->
    <div class="input-wrap">
      <ion-icon name="person-circle-outline" class="input-icon"></ion-icon>
      <ion-input
        [(ngModel)]="username"
        type="text"
        placeholder="Username or Email Address"
        class="custom-input"
        autocomplete="username"
        (keyup.enter)="onLogin()"
      ></ion-input>
    </div>

    <!-- Password -->
    <div class="input-wrap">
      <ion-icon name="lock-closed-outline" class="input-icon"></ion-icon>
      <ion-input
        [(ngModel)]="password"
        [type]="showPassword ? 'text' : 'password'"
        placeholder="Password"
        class="custom-input"
        autocomplete="current-password"
        (keyup.enter)="onLogin()"
      ></ion-input>
      <ion-icon
        [name]="showPassword ? 'eye-outline' : 'eye-off-outline'"
        class="input-icon-end"
        (click)="showPassword = !showPassword"
      ></ion-icon>
    </div>

    <!-- Forgot password -->
    <div class="forgot-row">
      <ion-button fill="clear" size="small" class="forgot-btn" (click)="onForgotPassword()">
        Forgot Password?
      </ion-button>
    </div>

    <!-- Sign In button -->
    <ion-button expand="block" shape="round" class="signin-btn" (click)="onLogin()" [disabled]="isLoading">
      <ion-spinner *ngIf="isLoading" name="crescent"></ion-spinner>
      <span *ngIf="!isLoading">Sign In</span>
    </ion-button>

    <!-- Register -->
    <div class="register-row">
      <span class="register-text">Don't have an account?</span>
      <ion-button fill="clear" size="small" class="signup-btn" (click)="onRegister()">Sign Up</ion-button>
    </div>
  </div>

</ion-content>
