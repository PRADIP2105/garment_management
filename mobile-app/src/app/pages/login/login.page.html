<ion-content [fullscreen]="true" class="login-page-content" scrollY="true">

  <!-- Hero — same as register -->
  <div class="login-hero">
    <div class="hero-icon-wrap">
      <ion-icon name="shirt-outline" class="hero-icon"></ion-icon>
    </div>
    <h1 class="hero-title">Garment Management</h1>
    <p class="hero-subtitle">Production Tracking System</p>
  </div>

  <!-- Card — same structure as register-card -->
  <div class="login-card">

    <div class="section-label">
      <ion-icon name="person-circle-outline" class="section-icon"></ion-icon>
      <span>Sign In</span>
    </div>

    <div class="input-group">
      <ion-icon name="person-outline" class="input-icon"></ion-icon>
      <ion-input
        [(ngModel)]="username"
        type="text"
        placeholder="Username"
        class="modern-input"
        autocomplete="username"
      ></ion-input>
    </div>

    <div class="input-group">
      <ion-icon name="lock-closed-outline" class="input-icon"></ion-icon>
      <ion-input
        [(ngModel)]="password"
        [type]="showPassword ? 'text' : 'password'"
        placeholder="Password"
        class="modern-input"
        autocomplete="current-password"
      ></ion-input>
      <ion-icon
        [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"
        class="input-icon-end"
        (click)="showPassword = !showPassword"
      ></ion-icon>
    </div>

    <!-- Forgot password -->
    <div class="forgot-row">
      <ion-button fill="clear" size="small" class="forgot-btn" (click)="onForgotPassword()">
        Forgot Password?
      </ion-button>
    </div>

    <ion-button
      expand="block"
      shape="round"
      class="login-btn"
      (click)="onLogin()"
      [disabled]="isLoading"
    >
      <ion-spinner *ngIf="isLoading" name="crescent" class="btn-spinner"></ion-spinner>
      <span *ngIf="!isLoading">Sign In</span>
    </ion-button>

    <div class="register-link">
      <span class="register-text">Don't have an account?</span>
      <ion-button fill="clear" size="small" (click)="onRegister()" class="register-link-btn">
        Sign Up
      </ion-button>
    </div>

  </div>

</ion-content>
