services:
  - type: web
    name: garment-management
    env: python
    runtime: python
    pythonVersion: "3.12.0"
    buildCommand: pip install --upgrade pip setuptools && pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate && python manage.py create_superadmin
    startCommand: gunicorn garment_saas.wsgi:application
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: false
      - key: DJANGO_ALLOWED_HOSTS
        value: garment-management.onrender.com
      - key: DB_ENGINE
        value: sqlite
      - key: SUPERADMIN_USERNAME
        value: superadmin
      - key: SUPERADMIN_PASSWORD
        value: admin@1234
