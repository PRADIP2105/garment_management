{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Login" %} - Garment Management{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white shadow rounded-lg p-6 text-sm">
    <h1 class="text-xl font-semibold mb-4">{% trans "Login" %}</h1>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-gray-700 mb-1" for="id_username">{% trans "Username" %}</label>
            <input type="text" name="username" id="id_username"
                   class="w-full border rounded px-3 py-2 text-sm"
                   required autofocus>
        </div>
        <div>
            <label class="block text-gray-700 mb-1" for="id_password">{% trans "Password" %}</label>
            <input type="password" name="password" id="id_password"
                   class="w-full border rounded px-3 py-2 text-sm"
                   required>
        </div>
        <button type="submit"
                class="w-full bg-indigo-600 text-white py-2 rounded text-sm font-medium hover:bg-indigo-700">
            {% trans "Login" %}
        </button>
    </form>
    <p class="mt-4 text-center text-sm">
        <a href="{% url 'web:forgot_password' %}" class="text-indigo-600 hover:underline">{% trans "Forgot Password?" %}</a>
    </p>
    <p class="mt-2 text-center text-sm">
        {% trans "Don't have an account?" %} <a href="{% url 'web:register' %}" class="text-indigo-600 hover:underline">{% trans "Register" %}</a>
    </p>
</div>
{% endblock %}
